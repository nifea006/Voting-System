<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

    <h1>Live Voting</h1>
    <canvas id="voteChart"></canvas>
    <form onsubmit="event.preventDefault(); vote(this);">
        <label for="subject">Vote on:</label>
        <select id="subject" name="subject">
            <option value="Subject A">Subject A</option>
            <option value="Subject B">Subject B</option>
            <option value="Subject C">Subject C</option>
        </select>
        <button type="submit">Vote</button>
    </form>
    <p>Total votes: <span id="vote-count">{{ votes }}</span></p>

</body>

</html>
