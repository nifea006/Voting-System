<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include "navbar.html" %}

    <div class="page-container">
        <h2>{{ subject.title }}</h2>
        <p>{{ subject.description }}</p>

        <form onsubmit="event.preventDefault(); submitVote('{{ subject.id }}')" class="form-card">
            {% if subject.is_anonymous %}
            <p class="form-note">Anonym avstemning</p>
            {% endif %}
            <div class="option-list">
                {% for option in options %}
                <label class="option-item">
                    <input type="radio" name="option" value="{{ option.id }}" {{ 'checked' if option.id == selected_option_id }} required>
                    {{ option.label }}
                </label>
                {% endfor %}
            </div>
            <button type="submit">Stem</button>
        </form>

        <div class="chart-container">
            <canvas id="voteChart"></canvas>
        </div>

        <p>Totalt antall stemmer: <span id="vote-count">{{ total_votes }}</span></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateVoteChart({
                options: '{{ vote_stats | tojson }}',
                total: '{{ total_votes }}'
            });
        });
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
