<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include "navbar.html" %}

    <div class="page-container">
        <h2>{{ subject.title }}</h2>
        <p>{{ subject.description }}</p>

        <select name="selectChartType" id="selectChartType" onchange="updateVoteChart()">
            <option value="bar">Bar</option>
            <option value="doughnut">Doughnut</option>
            <option value="line">Line</option>
            <option value="polarArea">Polar Area</option>
            <option value="radar">Radar</option>
            <option value="scatter">Scatter</option>
        </select>

        <div class="chart-container" id="vote-chart-container" {% if not selected_option_id %}hidden{% endif %}>
            <canvas id="voteChart"></canvas>
        </div>

        <br>

        <form onsubmit="event.preventDefault(); submitVote('{{ subject.id }}')" class="form-card"
            data-has-voted="{{ '1' if selected_option_id else '0' }}">
            {% if subject.is_anonymous %}
            <p class="form-note">Anonym avstemning</p>
            {% endif %}
            <div class="option-list">
                {% for option in options %}
                <label class="option-item">
                    <input type="radio" name="option" value="{{ option.id }}" {{ 'checked' if
                        option.id==selected_option_id }} required>
                    {{ option.label }}
                </label>
                {% endfor %}
            </div>
            <button type="submit" id="vote-submit">Stem</button>
        </form>

        <p id="total-votes-row" {% if not selected_option_id %}hidden{% endif %}>
            Totalt antall stemmer: <span id="vote-count">{{ total_votes }}</span>
        </p>
    </div>

    <div id="vote-data" data-initial-vote='{{ {"options": vote_stats, "total": total_votes} | tojson }}'
        data-has-voted="{{ 1 if selected_option_id else 0 }}"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
