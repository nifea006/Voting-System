<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opprett emne</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include "navbar.html" %}

    <div class="page-container">
        <h2>Opprett et nytt avstemningsemne</h2>

        {% if error %}
        <p class="form-error">{{ error }}</p>
        {% endif %}

        <form method="POST" class="form-card">
            <label>Tittel</label>
            <input type="text" name="title" value="{{ title or '' }}" required>

            <label>Beskrivelse</label>
            <textarea name="description">{{ description or '' }}</textarea>

            <label>Alternativer (minst 2)</label>
            <div id="options-container">
                {% for option in options %}
                <div class="option-row">
                    <input type="text" name="options" value="{{ option }}" required>
                    <button type="button" class="remove-option">-</button>
                </div>
                {% endfor %}
            </div>
            <button type="button" id="add-option">+</button>

            <br>
            <br>

            <label class="checkbox-row">
                <input type="checkbox" name="is_anonymous" {% if is_anonymous %}checked{% endif %}> Anonym avstemning
            </label>

            <label class="checkbox-row">
                <input type="checkbox" name="allow_vote_changes" {% if allow_vote_changes %}checked{% endif %}>
                Tillat at brukere kan endre stemmen sin senere
            </label>

            <div class="chart-picker">
                <label>Tilgjengelige diagramtyper etter avstemning</label>
                <p class="chart-picker-help">Klikk på knappene for å slå dem av eller på.</p>
                <div class="chart-toggle-group" id="chart-toggle-group">
                    {% for chart_type in available_chart_types %}
                    <input type="checkbox" name="allowed_chart_types" value="{{ chart_type }}" {% if chart_type in
                        selected_chart_types %}checked{% endif %} hidden>
                    <button type="button"
                        class="chart-toggle {% if chart_type in selected_chart_types %}active{% endif %}"
                        data-chart-toggle="{{ chart_type }}">
                        {{ chart_type }}
                    </button>
                    {% endfor %}
                </div>
            </div>

            <button type="submit">Opprett emne</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
