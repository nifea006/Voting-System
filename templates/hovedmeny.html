<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hovedmeny</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    {% include "navbar.html" %}

    <div class="page-container">
        <h2>Hovedmeny</h2>

        <div class="card-grid">
            {% for subject in subjects %}
            <div class="card">
                <h3>{{ subject.title }}</h3>
                {% if subject.is_anonymous %}
                <label>Anonym avstemning</label>
                {% else %}
                <label>Av {{ subject.creator_username or "ukjent bruker" }}</label>
                {% endif %}
                <p>{{ subject.description }}</p>
                <a href="{{ url_for('vote_page', subject_id=subject.id) }}">Stem</a>
                {% if session.get('is_admin') or subject.created_by == session.get('user_id') %}
                <form method="POST" action="{{ url_for('delete_subject', subject_id=subject.id) }}"
                    data-confirm-message="Er du sikker på at du vil slette dette emnet?">
                    <button type="submit" style="width: 100%;">Slett</button>
                </form>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
